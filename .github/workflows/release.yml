name: Build Release

on:
  push:
    branches:
      - api-summary-charts
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI on tag push
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          for attempt in {1..60}; do
            run_id="$(gh run list \
              --repo "$REPO" \
              --workflow "CI" \
              --branch "$REF_NAME" \
              --event push \
              --limit 10 \
              --json databaseId,headSha \
              --jq ".[] | select(.headSha == \"$SHA\") | .databaseId" \
              | head -n 1)"

            if [ -n "$run_id" ]; then
              gh run watch "$run_id" --repo "$REPO" --exit-status
              exit 0
            fi

            sleep 10
          done

          echo "Timed out waiting for CI run for $REF_NAME at $SHA" >&2
          exit 1

  extension:
    name: Chrome Extension
    runs-on: ubuntu-latest
    needs: wait-for-ci
    if: startsWith(github.ref, 'refs/tags/v') || contains(github.event.head_commit.message, '[publish-chrome]')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build all bundles + data
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Pack Chrome extension zip
        run: cd chrome-extension && zip -r ../chrome-extension-store.zip .

      - name: Create GitHub Release — Extension
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: chrome-extension-store.zip
          generate_release_notes: true

      - name: Publish to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          node --input-type=module <<'EOF'
          import { readFile } from 'node:fs/promises';

          const required = ['EXTENSION_ID', 'CLIENT_ID', 'CLIENT_SECRET', 'REFRESH_TOKEN'];
          for (const key of required) {
            if (!process.env[key]) throw new Error(`Missing ${key}`);
          }

          async function readJsonResponse(response) {
            const text = await response.text();
            console.log(text);
            try {
              return text ? JSON.parse(text) : {};
            } catch {
              return { raw: text };
            }
          }

          const tokenResponse = await fetch('https://oauth2.googleapis.com/token', {
            method: 'POST',
            headers: { 'content-type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
              client_id: process.env.CLIENT_ID,
              client_secret: process.env.CLIENT_SECRET,
              refresh_token: process.env.REFRESH_TOKEN,
              grant_type: 'refresh_token',
            }),
          });
          if (!tokenResponse.ok) {
            console.error(`Token request failed: HTTP ${tokenResponse.status}`);
            await readJsonResponse(tokenResponse);
            process.exit(1);
          }
          const { access_token: accessToken } = await tokenResponse.json();
          if (!accessToken) throw new Error('Token response did not include access_token');

          const zip = await readFile('chrome-extension-store.zip');
          const uploadResponse = await fetch(
            `https://www.googleapis.com/upload/chromewebstore/v1.1/items/${process.env.EXTENSION_ID}`,
            {
              method: 'PUT',
              headers: {
                authorization: `Bearer ${accessToken}`,
                'x-goog-api-version': '2',
                'content-type': 'application/zip',
              },
              body: zip,
            },
          );
          console.log(`Upload response: HTTP ${uploadResponse.status}`);
          const uploadResult = await readJsonResponse(uploadResponse);
          if (!uploadResponse.ok || uploadResult.uploadState === 'FAILURE') {
            console.error('Chrome Web Store upload failed');
            process.exit(1);
          }

          const publishResponse = await fetch(
            `https://www.googleapis.com/chromewebstore/v1.1/items/${process.env.EXTENSION_ID}/publish?publishTarget=default`,
            {
              method: 'POST',
              headers: {
                authorization: `Bearer ${accessToken}`,
                'x-goog-api-version': '2',
                'content-length': '0',
              },
            },
          );
          console.log(`Publish response: HTTP ${publishResponse.status}`);
          const publishResult = await readJsonResponse(publishResponse);
          if (!publishResponse.ok || publishResult.status?.some?.(status => status === 'ITEM_PENDING_REVIEW' || status === 'OK') === false) {
            console.error('Chrome Web Store publish failed');
            process.exit(1);
          }
          EOF

  launcher:
    name: Native Replay Launcher
    runs-on: ubuntu-latest
    needs: wait-for-ci
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Pack native host installer zip
        run: cd native-host && zip -r ../aoe4-replay-launcher.zip .

      - name: Create GitHub Release — Launcher
        uses: softprops/action-gh-release@v2
        with:
          files: aoe4-replay-launcher.zip
